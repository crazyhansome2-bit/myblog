<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Chaos Memory HP Analysis Cover</title>
  <desc id="desc">Anime inspired deep space terminal cover for a Honkai Star Rail numerical analysis note.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9ecf4"/>
      <stop offset="0.38" stop-color="#6285a2"/>
      <stop offset="0.72" stop-color="#17344f"/>
      <stop offset="1" stop-color="#081525"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#81a9c8" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="girlHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef9ff"/>
      <stop offset="0.52" stop-color="#9cc8e7"/>
      <stop offset="1" stop-color="#4d6f9a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#d8f3ff" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.9"/>
  <path d="M-80 780C280 650 396 760 650 635C930 497 1080 250 1690 325V960H-80Z" fill="#061321" opacity="0.55"/>
  <path d="M-60 695C250 590 475 655 720 520C1010 360 1190 265 1665 235" fill="none" stroke="#b8f3ff" stroke-opacity="0.18" stroke-width="3"/>
  <g filter="url(#softGlow)" opacity="0.85">
    <circle cx="228" cy="190" r="5" fill="#bbf7d0"/>
    <circle cx="310" cy="585" r="7" fill="#bbf7d0"/>
    <circle cx="1265" cy="210" r="6" fill="#bbf7d0"/>
    <circle cx="1405" cy="625" r="8" fill="#bbf7d0"/>
    <circle cx="710" cy="158" r="4" fill="#e0f2fe"/>
    <circle cx="1058" cy="540" r="5" fill="#e0f2fe"/>
  </g>
  <g transform="translate(190 155)">
