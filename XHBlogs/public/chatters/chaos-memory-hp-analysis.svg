    <text x="48" y="80" fill="#f8fbff" font-family="Arial, sans-serif" font-size="44" font-weight="800">混沌回忆 · 血量曲线</text>
    <text x="50" y="126" fill="#dbeafe" font-family="Arial, sans-serif" font-size="20" letter-spacing="4">CHAOS MEMORY HP ANALYSIS</text>
    <line x1="48" y1="166" x2="545" y2="166" stroke="#dff6ff" stroke-opacity="0.35"/>
    <polyline points="62,325 150,292 238,287 326,240 414,205 515,148" fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="62,332 150,306 238,302 326,265 414,248 515,226" fill="none" stroke="#f8fbff" stroke-opacity="0.35" stroke-width="3"/>
    <g fill="#f8fbff">
      <circle cx="62" cy="325" r="8"/><circle cx="150" cy="292" r="8"/><circle cx="238" cy="287" r="8"/>
      <circle cx="326" cy="240" r="8"/><circle cx="414" cy="205" r="8"/><circle cx="515" cy="148" r="8"/>
    </g>
    <text x="62" y="365" fill="#dbeafe" font-family="Arial, sans-serif" font-size="20">容错</text>
    <text x="408" y="120" fill="#f8fbff" font-family="Arial, sans-serif" font-size="54" font-weight="900">+18%</text>
  </g>
  <g transform="translate(935 145)">
    <path d="M230 0C333 38 400 132 400 260C400 445 300 586 204 586C92 586 0 438 0 265C0 123 102 15 230 0Z" fill="#071827" opacity="0.58"/>
    <path d="M190 88C122 113 82 184 82 296C82 432 142 528 212 528C286 528 340 418 337 292C334 157 270 82 190 88Z" fill="#f6fbff" opacity="0.92"/>
    <path d="M121 186C120 76 189 33 260 72C330 109 366 210 344 324C326 250 286 187 226 174C183 165 151 173 121 186Z" fill="url(#girlHair)"/>
    <path d="M128 186C83 238 72 342 108 434C128 360 164 300 214 275C181 246 148 217 128 186Z" fill="#789abb"/>
    <path d="M166 343C208 374 255 374 298 343C300 455 278 560 230 625C190 560 168 455 166 343Z" fill="#1d3856"/>
    <path d="M166 343C208 374 255 374 298 343" fill="none" stroke="#bae6fd" stroke-width="5" stroke-linecap="round"/>
    <circle cx="186" cy="242" r="9" fill="#24445e"/>
    <circle cx="264" cy="242" r="9" fill="#24445e"/>
    <path d="M204 292C225 304 248 304 268 292" fill="none" stroke="#24445e" stroke-width="5" stroke-linecap="round"/>
    <path d="M62 575C168 515 300 512 410 575V690H62Z" fill="#0b2038"/>
    <path d="M102 600C174 560 296 560 370 600" fill="none" stroke="#7dd3fc" stroke-opacity="0.5" stroke-width="4"/>
  </g>
  <g transform="translate(910 655)">
    <rect width="470" height="110" rx="24" fill="#eef7fb" opacity="0.2" stroke="#dff6ff" stroke-opacity="0.35"/>
    <text x="34" y="44" fill="#f8fbff" font-family="Arial, sans-serif" font-size="24" font-weight="800">伤害需求 = 总血量 ÷ 可用轮次</text>
    <text x="36" y="80" fill="#dbeafe" font-family="Arial, sans-serif" font-size="18">血量上涨时，真正被压缩的是循环和失误空间。</text>
  </g>
  <text x="92" y="805" fill="#f8fbff" font-family="Arial, sans-serif" font-size="34" font-weight="900">Linx · 随笔记录</text>
  <text x="92" y="844" fill="#dbeafe" font-family="Arial, sans-serif" font-size="20" letter-spacing="5">GAME DATA NOTE</text>
</svg>
